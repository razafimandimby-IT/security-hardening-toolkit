# ==============================================================================
# Configuration sysctl de durcissement - Security Hardening Toolkit
# Conforme CIS Benchmarks pour Linux
# Auteur: Louis Denis RAZAFIMANDIMBY
#
# Installation:
#   sudo cp 99-hardening.conf /etc/sysctl.d/
#   sudo sysctl -p /etc/sysctl.d/99-hardening.conf
# ==============================================================================

# ---------------------------------------------------------------------------
# 1. Reseau - Forwarding et Redirects
# ---------------------------------------------------------------------------

# Desactiver le forwarding IPv4
net.ipv4.ip_forward = 0

# Desactiver le forwarding IPv6
net.ipv6.conf.all.forwarding = 0

# Ne pas envoyer de redirects ICMP
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Ne pas accepter les redirects ICMP
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Ne pas accepter les redirects ICMPv6
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# ---------------------------------------------------------------------------
# 2. Reseau - Protection anti-attaques
# ---------------------------------------------------------------------------

# Activer les SYN cookies (protection SYN flood)
net.ipv4.tcp_syncookies = 1

# Reduire les retries TCP
net.ipv4.tcp_syn_retries = 2
net.ipv4.tcp_synack_retries = 2
net.ipv4.tcp_fin_timeout = 15

# Limiter la file d'attente SYN
net.ipv4.tcp_max_syn_backlog = 2048

# Protection RFC 1337 (time-wait assassination)
net.ipv4.tcp_rfc1337 = 1

# ---------------------------------------------------------------------------
# 3. ICMP
# ---------------------------------------------------------------------------

# Ignorer les broadcasts ICMP
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignorer les reponse ICMP bogues
net.ipv4.icmp_ignore_bogus_error_responses = 1

# ---------------------------------------------------------------------------
# 4. Filtrage de chemin inverse (rp_filter)
# ---------------------------------------------------------------------------

# Activer le filtrage de chemin inverse
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# ---------------------------------------------------------------------------
# 5. Routage source
# ---------------------------------------------------------------------------

# Desactiver l'acceptation du routage source
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# ---------------------------------------------------------------------------
# 6. Journalisation
# ---------------------------------------------------------------------------

# Journaliser les paquets martians (adresses impossibles)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# ---------------------------------------------------------------------------
# 7. Securite du kernel
# ---------------------------------------------------------------------------

# Randomisation de l'espace d'adressage (ASLR)
kernel.randomize_va_space = 2

# Restreindre les dumps core pour les binaires suid
fs.suid_dumpable = 0

# Protection des liens du systeme de fichiers
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_regular = 2
fs.protected_fifos = 2

# Desactiver SysRq magique
kernel.sysrq = 0

# Restreindre l'acces a dmesg
kernel.dmesg_restrict = 1

# Restreindre l'exposition des pointeurs kernel
kernel.kptr_restrict = 2

# Paranoia du perf event
kernel.perf_event_paranoid = 2

# ---------------------------------------------------------------------------
# 8. Limites des ressources reseau
# ---------------------------------------------------------------------------

# Augmenter la plage de ports ephemeres
net.ipv4.ip_local_port_range = 32768 65535

# Files d'attente
net.core.somaxconn = 1024
net.core.netdev_max_backlog = 5000

# Buffer TCP
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
